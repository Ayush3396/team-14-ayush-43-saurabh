<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Project - GitHub Activity</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Team Project</h1>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="content">
            <h2>Welcome to our Team Activity</h2>
            <p>This project demonstrates the GitHub workflow (Issues -> Branch -> PR -> Merge).</p>
        </div>
    </header>

    <main id="main-content">
        <section class="counter-section">
            <div class="card">
                <h3>Interactive Counter</h3>
                <p>This feature was added by Saurabh (Person 2).</p>
                <div class="counter-display" id="counter">0</div>
                <div class="button-group">
                    <button class="btn btn-primary" id="increment-btn">Increment</button>
                    <button class="btn btn-secondary" id="reset-btn">Reset</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Ayush (14) & Saurabh (43)</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
